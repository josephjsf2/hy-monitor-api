server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hy_monitor
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        globally_quoted_identifiers: true
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  jwt:
    secret: hy-monitor-jwt-secret-key-that-is-long-enough-for-hs256-algorithm
    expiration-ms: 86400000
  monitor:
    interval-ms: 60000
    timeout-ms: 10000
    slow-threshold-ms: 5000
